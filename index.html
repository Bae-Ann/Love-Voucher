    <!-- Meteor canvas -->
  <canvas id="meteorCanvas"></canvas>
  <script>
    const canvas = document.getElementById('meteorCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = [];
    const meteors = [];

    for (let i = 0; i < 150; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.2,
        alpha: Math.random(),
        dx: (Math.random() - 0.5) * 0.2,
        dy: (Math.random() - 0.5) * 0.2
      });
    }

    function createMeteor() {
      if (Math.random() < 0.02) {
        meteors.push({
          x: Math.random() * canvas.width,
          y: 0,
          length: Math.random() * 80 + 20,
          speed: Math.random() * 6 + 4,
          angle: Math.PI / 4
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, 2 * Math.PI);
        ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
        ctx.fill();
        star.x += star.dx;
        star.y += star.dy;
        if (star.x < 0 || star.x > canvas.width) star.dx *= -1;
        if (star.y < 0 || star.y > canvas.height) star.dy *= -1;
      });

      createMeteor();

      for (let i = 0; i < meteors.length; i++) {
        const m = meteors[i];
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.length * Math.cos(m.angle), m.y - m.length * Math.sin(m.angle));
        ctx.stroke();

        m.x += m.speed * Math.cos(m.angle);
        m.y += m.speed * Math.sin(m.angle);

        if (m.x > canvas.width || m.y > canvas.height) {
          meteors.splice(i, 1);
          i--;
        }
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>

  <!-- Bling stars -->
  <script>
  function createTwinkleStars(count) {
  for (let i = 0; i < count; i++) {
  const star = document.createElement('div');
    star.classList.add('bling-star');
    star.style.top = `${Math.random() * 100}vh`;
    star.style.left = `${Math.random() * 100}vw`;
    star.style.fontSize = `${Math.random() * 8 + 8}px`; // 8px ~ 16px
    star.style.animationDelay = `${Math.random() * 5}s`;
    document.body.appendChild(star);
  }
}
createTwinkleStars(10);
  </script>
